    <!-- Learn the purpose of <form> in HTML. Create a basic form structure with action and method.

Practice using <input type="text">, <input type="password">, and <input type="email">. Create a login form. -->
    <form action="day04Tsumbit.html">

    <!-- Use checkboxes for multiple choices, radio buttons for single choice, and number fields for numeric input. -->
     <form action="day04Tsumbit.html">
        <!-- single choices -->
         <label for="select gender">select gender</select></label> <br>
        MALE <input type="radio"><br>
        FEMALE <input type="radio"> <br>
        TRANSGENDER <input type="radio"> <br>

        <!-- MULTIPLE CHOICES -->
        <h1> CLICK WHICH DOCUMENTS YOU HAVE </h1>
         License<input type="checkbox"> <br>

         BIRTH CERTIFICATION <input type="checkbox"> <br>
         PASSPORT <input type="checkbox"> <br>
     </form>
     <!-- Learn <label> for accessibility and placeholder for hints. Connect labels with inputs using for and id. -->
       <h3> <b>Learn <label> for accessibility and placeholder for hints</b> 
         </h3> <br>
         <label for="name">name</label>
        <input type="text" id="name" name="name" placeholder=" type your name"> <br>
        <label for="age">age</label>
        <input type="number" id="age" name="age" placeholder="type your age"> <br><br>

      <!-- Use required to make fields mandatory. Practice building a signup form where name, email, and password are required. -->

       <form action="submit04">
